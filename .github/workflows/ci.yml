name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort mypy types-PyYAML types-requests types-aiofiles

      - name: Static Analysis
        run: |
          black --check src/
          isort --check-only src/
          ruff check src/
          mypy src/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Tox
        run: |
          python -m pip install --upgrade pip
          pip install tox

      - name: Create Tox Env Name
        id: env
        run: |
          V_MAJOR=$(echo ${{ matrix.python-version }} | cut -d. -f1)
          V_MINOR=$(echo ${{ matrix.python-version }} | cut -d. -f2)
          echo "tox_env=py${V_MAJOR}${V_MINOR}" >> $GITHUB_OUTPUT

      - name: Run Tests with Tox
        run: |
          tox -e ${{ steps.env.outputs.tox_env }}
        env:
          PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu

      - name: Save Coverage Artifact
        if: matrix.python-version == '3.14'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            .tox/py314/coverage.xml
          if-no-files-found: warn

  docker-ghcr:
    name: Docker GHCR (Multi-Arch)
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ghcr.io/${{ github.repository }}:latest ghcr.io/${{ github.repository }}:${{ github.sha }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          for tag in $TAGS; do
            cosign sign --yes ${tag}@${DIGEST}
          done

  sonar:
    name: SonarQube
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .
      - name: SonarScan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  smoke-test:
    name: Smoke Test
    needs: [docker-ghcr]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Testing Dependencies
        run: sudo apt-get update && sudo apt-get install -y tcptraceroute sshpass

      - name: Run Smoke Test
        run: |
          # Pull latest built image
          docker pull ghcr.io/${{ github.repository }}:latest
          
          # Run container with all exposed ports
          docker run -d --name smoke-test \
            -p 2222:2222 -p 2323:2323 -p 9090:9090 \
            -e CYANIDE_USERS='[{"user": "root", "pass": "admin"}]' \
            ghcr.io/${{ github.repository }}:latest
            
          echo "Waiting for container to start (up to 15s)..."
          sleep 15
          
          # 1. Check Container Status
          if [ "$(docker inspect -f '{{.State.Running}}' smoke-test)" != "true" ]; then
            echo "Container died or failed to start!"
            docker logs smoke-test
            exit 1
          fi
          echo "Container is running."
          
          # 2. Check Metrics/Health (Port 9090)
          echo "Checking Metrics HTTP 200..."
          curl -s -f --retry 5 --retry-connrefused --retry-delay 2 http://127.0.0.1:9090/health || {
              echo "Health endpoint failed or returned non-200. Logs:"
              docker logs smoke-test
              exit 1
          }
          
          # 3. Check TCP Ports using Python socket
          echo "Testing TCP sockets for SSH (2222) and Telnet (2323)..."
          python3 -c 'import socket, sys; s=socket.socket(); s.settimeout(5); s.connect(("127.0.0.1", 2222)); s.close()' || exit 1
          python3 -c 'import socket, sys; s=socket.socket(); s.settimeout(5); s.connect(("127.0.0.1", 2323)); s.close()' || exit 1
          
          # 4. Minimal SSH Session (Login + 1 Command)
          echo "Testing SSH Login and Command Execution..."
          export SSHPASS="admin"
          sshpass -e ssh -v -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 2222 root@127.0.0.1 "echo SMOKE_TEST_OK" > ssh_output.txt 2>&1 || true #nosemgrep
          cat ssh_output.txt
          if ! grep -q "SMOKE_TEST_OK" ssh_output.txt; then
            echo "SSH session check failed to return expected output!"
            docker logs smoke-test
            exit 1
          fi
          
          echo "All Smoke Tests Passed Successfully!"
          docker rm -f smoke-test

  test-pypi:
    name: Publish to TestPyPI
    needs: [smoke-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: test-pypi
      url: https://test.pypi.org/p/cyanide
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Build and Publish
        run: |
          pip install build
          python -m build
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
