name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort mypy types-PyYAML types-requests types-aiofiles

      - name: Static Analysis
        run: |
          black --check src/
          isort --check-only src/
          ruff check src/
          mypy src/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks (Secret Detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/python

      - name: Dependency Audit (Safety)
        run: |
          pip install pip-audit
          pip-audit

  test:
    name: Tests (Python ${{ matrix.python-version }})
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Tox
        run: |
          python -m pip install --upgrade pip
          pip install tox

      - name: Create Tox Env Name
        id: env
        run: |
          V_MAJOR=$(echo ${{ matrix.python-version }} | cut -d. -f1)
          V_MINOR=$(echo ${{ matrix.python-version }} | cut -d. -f2)
          echo "tox_env=py${V_MAJOR}${V_MINOR}" >> $GITHUB_OUTPUT

      - name: Run Tests with Tox
        run: |
          tox -e ${{ steps.env.outputs.tox_env }}

      - name: Save Coverage Artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-ghcr:
    name: Docker GHCR (Multi-Arch)
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ matrix.arch }}-latest
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy (Image Vulnerability Scan)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}:${{ matrix.arch }}-latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  sonar:
    name: SonarQube
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .
      - name: SonarScan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  smoke-test:
    name: Smoke Test
    needs: [docker-ghcr]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Smoke Test
        run: |
          docker pull ghcr.io/${{ github.repository }}:latest
          docker run -d --name smoke-test -p 2222:2222 ghcr.io/${{ github.repository }}:latest
          sleep 5
          docker logs smoke-test
          docker rm -f smoke-test

  test-pypi:
    name: Publish to TestPyPI
    needs: [smoke-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: test-pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build and Publish
        run: |
          pip install build twine
          python -m build
          twine upload --repository testpypi dist/* --non-interactive --skip-existing
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
