name: Cyanide Smoke Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: deployments/docker/Dockerfile
        push: false
        load: true
        tags: cyanide:latest

    - name: Run Container
      run: |
        docker run -d \
          -e CYANIDE_TELNET_ENABLED=true \
          -e CYANIDE_TELNET_PORT=2223 \
          -e CYANIDE_SMTP_ENABLED=true \
          -e CYANIDE_SMTP_PORT=2525 \
          -e CYANIDE_METRICS_ENABLED=true \
          -p 2222:2222 \
          -p 2223:2223 \
          -p 2525:2525 \
          -p 9090:9090 \
          --name cyanide \
          cyanide:latest
        
    - name: Wait for startup
      run: sleep 10

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: pip install requests asyncssh

    - name: Run Smoke Test
      env:
        CYANIDE_SSH_PORT: 2222
        CYANIDE_TELNET_PORT: 2223
        CYANIDE_SMTP_PORT: 2525
        CYANIDE_METRICS_PORT: 9090
      run: python3 tests/integration/smoke_test.py

    - name: Check Container Logs (if failed)
      if: failure()
      run: docker logs cyanide
