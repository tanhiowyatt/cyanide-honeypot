# Cyanide Honeypot Configuration

[honeypot]
hostname = server01
log_path = var/log/cyanide
data_path = var/lib/cyanide
dns_cache_ttl = 60

[server]
host = 0.0.0.0
# Options: ubuntu_22_04, debian_11, centos_7, custom, random
os_profile = random

max_sessions = 100
max_sessions_per_ip = 5
session_timeout = 300
quarantine_max_size_mb = 500

[users]
root = admin
admin = admin

[metrics]
enabled = true
port = 9090

[ml]
enabled = true
metrics_port = 9090
ml_log = var/log/cyanide/cyanideML-log.json
model_path = ai_models/cyanideML/cyanideML.pkl
online_learning = false

[ssh]
enabled = true
listen_port = 2222
rsa_keying = true
version = SSH-2.0-OpenSSH_8.2p1 Ubuntu-4ubuntu0.5

[telnet]
enabled = true
listen_port = 2223

[smtp]
enabled = true
listen_port = 2525
target_host = 127.0.0.1
target_port = 25255

[output]
json_log = true

[cleanup]
enabled = true
interval = 3600
retention_days = 7
paths = var/log/cyanide,var/lib/cyanide
