honeypot:
  # Hostname reported by the honeypot
  hostname: server01
  
  # Quarantine max size in MB
  quarantine_max_size_mb: 500

server:
  # IP address to bind to
  host: 0.0.0.0
  
  # OS Consistency Profile
  os_profile: random
  
  # Maximum total concurrent sessions
  max_sessions: 100
  
  # Maximum concurrent sessions per IP
  max_sessions_per_ip: 5
  
  # Session timeout in seconds
  session_timeout: 300

users:
  - user: root
    pass: admin
  - user: admin
    pass: admin
  - user: user
    pass: "123456"

metrics:
  enabled: true
  port: 9090

ml:
  enabled: true
  metrics_port: 9090
  online_learning: false
  retraining_interval_days: 7

ssh:
  enabled: true
  listen_port: 2222
  rsa_keying: true
  backend_mode: emulated

telnet:
  enabled: true
  listen_port: 2223
  backend_mode: emulated

smtp:
  enabled: true
  listen_port: 2525
  target_host: 127.0.0.1
  target_port: 25255

output:
  # Output Plugins 
  # Note: `pip install .[outputs]` is required if running directly outside of Docker.
  
  sqlite:
    enabled: true
    path: var/log/cyanide/events.sqlite
    table: events
  
  postgresql:
    enabled: false
    host: 127.0.0.1
    port: 5432
    user: cyanide
    password: password
    database: cyanide
    table: events

  elasticsearch:
    enabled: false
    hosts: 
      - http://127.0.0.1:9200
    index: cyanide-events

  splunk_hec:
    enabled: false
    url: https://127.0.0.1:8088/services/collector/event
    token: "YOUR_TOKEN_HERE"
    source: cyanide
    sourcetype: _json
    verify_ssl: false

  graylog:
    enabled: false
    host: 127.0.0.1
    port: 12201

  syslog:
    enabled: false
    address: /dev/log
    facility: user
  
  slack:
    enabled: false
    webhook_url: ""
    username: "Cyanide Honeypot"

  hpfeeds:
    enabled: false
    host: hpfeeds.honeycloud.net
    port: 10000
    ident: ""
    secret: ""
    channel: cyanide.events

  dshield:
    enabled: false
    userid: ""
    authkey: ""
    batch_size: 50
    url: "https://isc.sans.edu/api/submit/file"

  mysql:
    enabled: false
    host: 127.0.0.1
    port: 3306
    user: cyanide
    password: password
    database: cyanide
    table: events

  mongodb:
    enabled: false
    uri: "mongodb://127.0.0.1:27017/"
    database: cyanide
    collection: events

  rethinkdb:
    enabled: false
    host: 127.0.0.1
    port: 28015
    database: cyanide
    table: events

cleanup:
  enabled: true
  interval: 3600
  retention_days: 7

virustotal:
  enabled: false
  api_key: ""  

otel:
  enabled: true
  exporter: otlp
  endpoint: http://localhost:4318/v1/traces
