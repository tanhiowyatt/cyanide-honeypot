metadata:
  os_name: "CentOS 7"
  kernel_version: "3.10.0-1160.108.1.el7.x86_64"
  hostname: "centos-server"
  arch: "x86_64"
  ssh_banner: "SSH-2.0-OpenSSH_7.4"
  os_id: "centos"
  version_id: "7"
  install_date: "2024-01-25T16:17:31Z"

honeytokens:
  - "/etc/passwd"
  - "/etc/shadow"

dynamic_files:
  /proc/uptime:
    type: generated
    provider: uptime_provider
  /proc/cpuinfo:
    type: generated
    provider: cpuinfo_provider
  /proc/version:
    content: "Linux version {{ kernel_version }} (mockbuild@kbuilder.bsys.centos.org) (gcc version 4.8.5 20150623 (Red Hat 4.8.5-44) (GCC) ) #1 SMP Thu Jan 25 16:17:31 UTC 2024"
  /etc/motd:
    type: generated
    provider: motd_provider
