  /etc/ssh/ssh_host_rsa_key:
    content: ''
  /etc/ssh/sshd_config:
    content: "# Package generated configuration file\n# See the sshd_config(5) manpage\
      \ for details\n\n# What ports, IPs and protocols we listen for\nPort 22\n# Use\
      \ these options to restrict which interfaces/protocols sshd will bind to\n#ListenAddress\
      \ ::\n#ListenAddress 0.0.0.0\nProtocol 2\n# HostKeys for protocol version 2\n\
      HostKey /etc/ssh/ssh_host_rsa_key\nHostKey /etc/ssh/ssh_host_ecdsa_key\nHostKey\
      \ /etc/ssh/ssh_host_ed25519_key\n\n#Privilege Separation is turned on for security\n\
      UsePrivilegeSeparation yes\n\n# Lifetime and size of ephemeral version 1 server\
      \ key\nKeyRegenerationInterval 3600\nServerKeyBits 1024\n\n# Logging\nSyslogFacility\
      \ AUTH\nLogLevel INFO\n\n# Authentication:\nLoginGraceTime 120\nPermitRootLogin\
      \ yes\nStrictModes yes\n\nRSAAuthentication yes\nPubkeyAuthentication yes\n\
      #AuthorizedKeysFile\t%h/.ssh/authorized_keys\n\n# Don't read the user's ~/.rhosts\
      \ and ~/.shosts files\nIgnoreRhosts yes\n# For this to work you will also need\
      \ host keys in /etc/ssh_known_hosts\nRhostsRSAAuthentication no\n# similar for\
      \ protocol version 2\nHostbasedAuthentication no\n# Uncomment if you don't trust\
      \ ~/.ssh/known_hosts for RhostsRSAAuthentication\n#IgnoreUserKnownHosts yes\n\
      \n# To enable empty passwords, change to yes (NOT RECOMMENDED)\nPermitEmptyPasswords\
      \ no\n\n# Change to yes to enable challenge-response passwords (beware issues\
      \ with\n# some PAM modules and threads)\nChallengeResponseAuthentication no\n\
      \n# Change to no to disable tunnelled clear text passwords\nPasswordAuthentication\
      \ yes\n\n# Standard SSH settings\nSubsystem\tsftp\t/usr/lib/openssh/sftp-server\n\
      UsePAM yes\nX11Forwarding yes\nPrintMotd no\n"
  /home/admin/.bashrc:
    content: '# ~/.bashrc: executed by bash(1) for non-login shells.

      export PS1=''${debian_chroot:+($debian_chroot)}\u@\h:\w\$ ''

      alias ls=''ls --color=auto''

      alias ll=''ls -alF''

      '
  /root/.bashrc:
    content: '# ~/.bashrc: executed by bash(1) for non-login shells.

      export PS1=''${debian_chroot:+($debian_chroot)}\u@\h:\w\$ ''

      alias ls=''ls --color=auto''

      alias ll=''ls -alF''

      alias la=''ls -A''

      alias l=''ls -CF''

      '
