version: '3.8'

services:
  honeypot:
    build: .
    ports:
      - "22:2222"
      - "23:2223"
      # Dashboard port
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
    restart: unless-stopped
    command: >
      sh -c "python honeypot.py & uvicorn web.app:app --host 0.0.0.0 --port 8000"
