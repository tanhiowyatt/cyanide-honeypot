services:
  cyanide:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile
    container_name: cyanide
    restart: unless-stopped
    ports:
      - "2222:2222"
      - "2223:2223"
      - "2525:2525"
      - "9090:9090"
    volumes:
      - ../../var/log:/app/var/log
      - ../../var/lib/cyanide:/app/var/lib/cyanide
      - ../../var/quarantine:/app/var/quarantine
      - ../../configs/app.yaml:/app/configs/app.yaml
      - ../../configs/profiles:/app/configs/profiles:ro
      - ../../src:/app/src
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    environment:
      - PYTHONUNBUFFERED=1
      - CYANIDE_HONEYPOT_HOSTNAME=server01
      - CYANIDE_SERVER_OS_PROFILE=ubuntu
      - CYANIDE_SERVER_MAX_SESSIONS=100
      - CYANIDE_SERVER_MAX_SESSIONS_PER_IP=5
      - CYANIDE_SERVER_SESSION_TIMEOUT=300
      - CYANIDE_HONEYPOT_QUARANTINE_MAX_SIZE_MB=500
      - CYANIDE_SSH_ENABLED=true
      - CYANIDE_SSH_VFS_PERSISTENCE=true
      - CYANIDE_SSH_LISTEN_PORT=2222
      - CYANIDE_TELNET_ENABLED=true
      - CYANIDE_TELNET_LISTEN_PORT=2223
      - CYANIDE_ML_ENABLED=true
      - CYANIDE_ML_RETRAINING_INTERVAL_DAYS=7
      - CYANIDE_CLEANUP_ENABLED=true
      - CYANIDE_CLEANUP_INTERVAL=3600
      - CYANIDE_CLEANUP_RETENTION_DAYS=7
      - CYANIDE_OTEL_ENABLED=true
      - CYANIDE_METRICS_ENABLED=true
      - CYANIDE_METRICS_PORT=9090
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
      - CYANIDE_VIRUSTOTAL_ENABLED=false
      - CYANIDE_SMTP_ENABLED=true
      - CYANIDE_SMTP_PORT=2525
      - CYANIDE_SMTP_TARGET_HOST=mailhog
      - CYANIDE_SMTP_TARGET_PORT=1025
      - 'CYANIDE_USERS=[{"user": "root", "pass": "admin"}, {"user": "admin", "pass": "admin"}]'
    healthcheck:
      test: [ "CMD", "python3", "/app/deployments/docker/healthcheck.py" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
