[honeypot]
hostname = server01
log_path = var/log/cyanide
data_path = var/lib/cyanide
fs_pickle = share/cyanide/fs.pickle
txtcmds_path = share/cyanide/txtcmds

[ssh]
enabled = true
listen_port = 2222
rsa_keying = true
version = SSH-2.0-OpenSSH_8.2p1 Ubuntu-4ubuntu0.5

[telnet]
enabled = false
listen_port = 2223

[output]
json_log = true
text_log = false
