[honeypot]
hostname = server01
log_path = var/log/cyanide
data_path = var/lib/cyanide
fs_pickle = share/cyanide/fs.pickle
txtcmds_path = share/cyanide/txtcmds

[server]
host = 0.0.0.0
# OS Consistency: ubuntu_22_04, debian_11, centos_7, or random
os_profile = random
# Server Performance
max_sessions = 100
max_sessions_per_ip = 5
session_timeout = 300
quarantine_max_size_mb = 500

[users]
root = admin
admin = admin

[metrics]
enabled = true
port = 9090


[ssh]
enabled = true
listen_port = 2222
rsa_keying = true
version = SSH-2.0-OpenSSH_8.2p1 Ubuntu-4ubuntu0.5

[telnet]
enabled = true 
listen_port = 2223


[output]
json_log = true

[cleanup]
enabled = true
interval = 3600
retention_days = 7
paths = var/log/cyanide,var/quarantine

[virustotal]
enabled = true
api_key = 8df0c970a7e8e9b9b22fb25b27a2187573b4d69d5f364b443ca75cd92494f718
