honeypot:
  hostname: server01
  quarantine_max_size_mb: 500
  dns_cache_ttl: 60
  allow_local_network: false
  fs_yaml: ""

server:
  host: 0.0.0.0
  os_profile: random
  max_sessions: 100
  max_sessions_per_ip: 5
  session_timeout: 300

logging:
  directory: var/log/cyanide
  logtype: plain
  rotation:
    strategy: time
    when: midnight
    interval: 1
    backup_count: 14
    max_bytes: 10485760

pool:
  enabled: false
  mode: libvirt
  max_vms: 5
  recycle_period: 1500
  vm_unused_timeout: 600
  share_guests: true
  libvirt_uri: qemu:///system
  guest_config: configs/pool/default_guest.xml
  guest_tag: ubuntu18.04
  guest_ssh_port: 22
  guest_telnet_port: 23
  use_nat: true
  nat_public_ip: 192.168.1.40
  save_snapshots: false
  snapshot_path: var/lib/cyanide/snapshots
  targets: ""

users:
  - user: root
    pass: admin
  - user: admin
    pass: admin
  - user: user
    pass: "123456"

metrics:
  enabled: true
  port: 9090
  allow_remote: true

ml:
  enabled: true
  metrics_port: 9090
  online_learning: false
  retraining_interval_days: 7

ioc_reporting:
  enabled: true
  report_interval_hours: 1
  output_format: stix2.1

ssh:
  enabled: true
  listen_port: 2222
  rsa_keying: true
  backend_mode: emulated
  version: ""
  ciphers: ["aes256-gcm@openssh.com", "aes128-gcm@openssh.com", "chacha20-poly1305@openssh.com", "aes256-ctr", "aes192-ctr", "aes128-ctr"]
  macs: ["hmac-sha2-512-etm@openssh.com", "hmac-sha2-256-etm@openssh.com", "umac-128-etm@openssh.com", "hmac-sha2-512", "hmac-sha2-256", "umac-128@openssh.com"]
  compression: ["none", "zlib@openssh.com"]
  kex_algs: ["curve25519-sha256", "curve25519-sha256@libssh.org", "ecdh-sha2-nistp256", "ecdh-sha2-nistp384", "ecdh-sha2-nistp521", "diffie-hellman-group-exchange-sha256", "diffie-hellman-group16-sha512", "diffie-hellman-group18-sha512", "diffie-hellman-group14-sha256"]
  host_key_algs: ["ssh-ed25519", "rsa-sha2-512", "rsa-sha2-256", "ecdsa-sha2-nistp256"]
  public_key_algs: ["ssh-ed25519", "rsa-sha2-512", "rsa-sha2-256", "ecdsa-sha2-nistp256"]
  data_path: "var/lib/cyanide/keys"
  auth_tries: 3
  login_timeout: 60
  idle_timeout: 3600
  rekey_limit: "1G"
  sftp_enabled: true
  scp_enabled: true
  rsync_enabled: true
  max_upload_size_mb: 50
  max_total_upload_mb_per_session: 200
  allow_download: true
  allow_upload: true
  forwarding_enabled: false
  forward_redirect_enabled: false
  forward_redirect_rules:
    "80": "127.0.0.1:8080"
  forward_tunnel_enabled: false
  forward_tunnel_rules:
    "3306": "mysql-sandbox:3306"

telnet:
  enabled: true
  listen_port: 2323
  backend_mode: emulated

smtp:
  enabled: true
  port: 2525
  target_host: 127.0.0.1
  target_port: 25255

output:
  sqlite:
    enabled: false
    path: var/log/cyanide/events.sqlite
    table: events
  postgresql:
    enabled: false
    host: postgresql
    port: 5432
    user: cyanide
    password: password
    database: cyanide
    table: events
  elasticsearch:
    enabled: false
    hosts: 
      - http://elasticsearch:9200
    index: cyanide-events
  splunk_hec:
    enabled: false
    url: https://splunk:8088/services/collector/event
    token: "YOUR_TOKEN_HERE"
    source: cyanide
    sourcetype: _json
    verify_ssl: false
  syslog:
    enabled: false
    address: /dev/log
    facility: user
  slack:
    enabled: false
    webhook_url: ""
    username: "Cyanide Honeypot"
  discord:
    enabled: false
    webhook_url: ""
    username: "Cyanide Honeypot"
  telegram:
    enabled: false
    token: ""
    chat_id: ""
  hpfeeds:
    enabled: false
    host: hpfeeds.honeycloud.net
    port: 10000
    ident: ""
    secret: ""
    channel: cyanide.events
  mysql:
    enabled: false
    host: mysql
    port: 3306
    user: cyanide
    password: password
    database: cyanide
    table: events
  mongodb:
    enabled: false
    uri: "mongodb://mongodb:27017/"
    database: cyanide
    collection: events
  rethinkdb:
    enabled: false
    host: rethinkdb
    port: 28015
    database: cyanide
    table: events

cleanup:
  enabled: false
  interval: 3600
  retention_days: 7

virustotal:
  enabled: false
  api_key: ""  

otel:
  enabled: false
  exporter: otlp
  endpoint: http://localhost:4318/v1/traces
