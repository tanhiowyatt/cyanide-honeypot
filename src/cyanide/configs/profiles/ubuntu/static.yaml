static_files:
  tree_folders: /bin /boot /dev /etc /home /lib /lib64 /media /mnt /opt /proc /root /run /srv /sys /tmp /usr /var /var/log /var/spool/cron/crontabs

  nodes:
    etc:
      bash.bashrc: ""
      debian_version: "bookworm/sid\n"
      fstab: |
        # /etc/fstab: static file system information.
        #
        # <file system> <mount point>   <type>  <options>       <dump>  <pass>
        /dev/mapper/ubuntu--vg-root /               ext4    errors=remount-ro 0       1
        UUID=b3a4c5d6-e7f8-9a0b-1c2d-3e4f5a6b7c8d /boot           ext4    defaults        0       2
        /dev/mapper/ubuntu--vg-swap_1 none            swap    sw              0       0
      group: |
        root:x:0:
        daemon:x:1:
        bin:x:2:
        sys:x:3:
        adm:x:4:syslog,admin
        tty:x:5:
        disk:x:6:
        lp:x:7:
        mail:x:8:
        news:x:9:
        uucp:x:10:
        proxy:x:13:
        www-data:x:33:
        backup:x:34:
        list:x:38:
        irc:x:39:
        gnats:x:41:
        shadow:x:42:
        utmp:x:43:
        video:x:44:
        sasl:x:45:
        plugdev:x:46:
        staff:x:50:
        games:x:60:
        users:x:100:
        nogroup:x:65534:
        systemd-journal:x:101:
        systemd-network:x:102:
        systemd-resolve:x:103:
        systemd-timesync:x:104:
        messagebus:x:105:
        _apt:x:106:
        uuidd:x:107:
        tcpdump:x:108:
        sshd:x:109:
        admin:x:1000:
      hostname: "{{ hostname }}\n"
      hosts: |
        127.0.0.1 localhost
        127.0.1.1 {{ hostname }}
        # The following lines are desirable for IPv6 capable hosts
        ::1     ip6-localhost ip6-loopback
        fe00::0 ip6-localnet
        ff00::0 ip6-mcastprefix
        ff02::1 ip6-allnodes
        ff02::2 ip6-allrouters
      issue: "Welcome to {{ os_name }} {{ version_id }} {{ kernel_version }} \\n \\l\n"
      lsb-release: |
        DISTRIB_ID=Ubuntu
        DISTRIB_RELEASE={{ version_id }}
        DISTRIB_CODENAME=jammy
        DISTRIB_DESCRIPTION="Ubuntu {{ version_id }} LTS"
      motd: |
        Welcome to Ubuntu {{ version_id }} LTS (GNU/Linux {{ kernel_version }} x86_64)

         * Documentation:  https://help.ubuntu.com
         * Management:     https://landscape.canonical.com
         * Support:        https://ubuntu.com/advantage

        0 updates can be applied immediately.
      os-release: |
        PRETTY_NAME="{{ os_name }} {{ version_id }} LTS"
        NAME="{{ os_name }}"
        VERSION_ID="{{ version_id }}"
        VERSION="{{ version_id }} LTS (Jammy Jellyfish)"
        ID={{ os_id }}
        ID_LIKE=debian
        HOME_URL="https://www.ubuntu.com/"
        SUPPORT_URL="https://help.ubuntu.com/"
        BUG_REPORT_URL="https://bugs.launchpad.net/ubuntu/"
        PRIVACY_POLICY_URL="https://www.ubuntu.com/legal/terms-and-policies/privacy-policy"
        VERSION_CODENAME=jammy
        UBUNTU_CODENAME=jammy
      passwd.txt: |
        root:x:0:0:root:/root:/bin/bash
        daemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin
        bin:x:2:2:bin:/bin:/usr/sbin/nologin
        sys:x:3:3:sys:/dev:/usr/sbin/nologin
        sync:x:4:65534:sync:/bin:/bin/sync
        games:x:5:60:games:/usr/games:/usr/sbin/nologin
        man:x:6:12:man:/var/cache/man:/usr/sbin/nologin
        lp:x:7:7:lp:/var/spool/lpd:/usr/sbin/nologin
        mail:x:8:8:mail:/var/mail:/usr/sbin/nologin
        news:x:9:9:news:/var/spool/news:/usr/sbin/nologin
        uucp:x:10:10:uucp:/var/spool/uucp:/usr/sbin/nologin
        proxy:x:13:13:proxy:/bin:/usr/sbin/nologin
        www-data:x:33:33:www-data:/var/www:/usr/sbin/nologin
        backup:x:34:34:backup:/var/backup:/usr/sbin/nologin
        list:x:38:38:Mailing List Manager:/var/list:/usr/sbin/nologin
        irc:x:39:39:ircd:/run/ircd:/usr/sbin/nologin
        gnats:x:41:41:Gnats Bug-Reporting System (admin):/var/lib/gnats:/usr/sbin/nologin
        nobody:x:65534:65534:nobody:/nonexistent:/usr/sbin/nologin
        _apt:x:100:65534::/nonexistent:/usr/sbin/nologin
        systemd-network:x:101:102:systemd Network Management,,,:/run/systemd:/usr/sbin/nologin
        systemd-resolve:x:102:103:systemd Resolver,,,:/run/systemd:/usr/sbin/nologin
        messagebus:x:103:104::/nonexistent:/usr/sbin/nologin
        systemd-timesync:x:104:105:systemd Time Sync,,,:/run/systemd:/usr/sbin/nologin
        pollinate:x:105:1::/var/cache/pollinate:/bin/false
        sshd:x:106:65534::/run/sshd:/usr/sbin/nologin
        syslog:x:107:113::/home/syslog:/usr/sbin/nologin
        uuidd:x:108:114::/run/uuidd:/usr/sbin/nologin
        tcpdump:x:109:115::/nonexistent:/usr/sbin/nologin
        tss:x:110:116:TPM2 software stack,,,:/var/lib/tpm:/bin/false
        landscape:x:111:117::/var/lib/landscape:/usr/sbin/nologin
        fwupd-refresh:x:112:118:fwupd-refresh user,,,:/run/systemd:/usr/sbin/nologin
        admin:x:1000:1000:admin:/home/admin:/bin/bash
      profile: ""
      resolv.conf: |
        # This is /run/systemd/resolve/stub-resolv.conf managed by systemd-resolved.
        # Do not edit.
        nameserver 127.0.0.53
        options edns0 trust-ad
        search localdomain
      shadow: |
        root:*:19450:0:99999:7:::
        daemon:*:19450:0:99999:7:::
        bin:*:19450:0:99999:7:::
        sys:*:19450:0:99999:7:::
        sync:*:19450:0:99999:7:::
        games:*:19450:0:99999:7:::
        man:*:19450:0:99999:7:::
        lp:*:19450:0:99999:7:::
        mail:*:19450:0:99999:7:::
        news:*:19450:0:99999:7:::
        uucp:*:19450:0:99999:7:::
        proxy:*:19450:0:99999:7:::
        www-data:*:19450:0:99999:7:::
        backup:*:19450:0:99999:7:::
        list:*:19450:0:99999:7:::
        irc:*:19450:0:99999:7:::
        gnats:*:19450:0:99999:7:::
        nobody:*:19450:0:99999:7:::
        systemd-network:*:19450:0:99999:7:::
        systemd-resolve:*:19450:0:99999:7:::
        systemd-timesync:*:19450:0:99999:7:::
        messagebus:*:19450:0:99999:7:::
        _apt:*:19450:0:99999:7:::
        uuidd:*:19450:0:99999:7:::
        tcpdump:*:19450:0:99999:7:::
        sshd:*:19450:0:99999:7:::
        admin:$6$v.CkqC7f$6T5S9X...:19450:0:99999:7:::
      shells: |
        # /etc/shells: valid login shells
        /bin/sh
        /bin/bash
        /usr/bin/bash
        /bin/rbash
        /usr/bin/rbash
        /bin/dash
        /usr/bin/dash
      ssh:
        sshd_config: |
          Port 22
          Protocol 2
          HostKey /etc/ssh/ssh_host_rsa_key
          HostKey /etc/ssh/ssh_host_ecdsa_key
          HostKey /etc/ssh/ssh_host_ed25519_key

          # Authentication:
          LoginGraceTime 120
          PermitRootLogin yes
          StrictModes yes

          # To disable tunneled clear text passwords, change to no here!
          PasswordAuthentication yes
          PermitEmptyPasswords no

          # Standard SSH settings
          Subsystem sftp /usr/lib/openssh/sftp-server
          UsePAM yes
          X11Forwarding yes
          PrintMotd no

    bin: [ awk, bash, cat, cp, grep, gzip, ls, mkdir, mv, ping, ps, rm, sed, sh, tar, top ]

    usr/bin: [ apt, apt-get, curl, dpkg, python3, systemctl, vim, wget ]

    home/admin:
      .bashrc: |
        # ~/.bashrc: executed by bash(1) for non-login shells.
        export PS1='${debian_chroot:+($debian_chroot)}\u@\h:\w\$ '
        alias ls='ls --color=auto'
        alias ll='ls -alF'

    root:
      .bashrc: |
        # ~/.bashrc: executed by bash(1) for non-login shells.
        export PS1='${debian_chroot:+($debian_chroot)}\u@\h:\w\$ '
        alias ls='ls --color=auto'
        alias ll='ls -alF'
        alias la='ls -A'
        alias l='ls -CF'
