[tox]
envlist = py310, py311, py312, py313, py314, lint, type, audit
skipsdist = True

[testenv]
deps = 
    .[dev]
setenv =
    PYTHONPATH = {toxinidir}/src
changedir = {toxinidir}
commands = pytest --cov=src --cov-report=term-missing --cov-fail-under=80 src/cyanide/tests/

[testenv:lint]
deps = 
    ruff
    black
    isort
commands =
    ruff check src/
    black --check src/
    isort --check-only src/

[testenv:type]
deps = 
    mypy
    .[dev]
commands =
    mypy src/

[testenv:audit]
deps = 
    pip-audit
commands =
    pip-audit
