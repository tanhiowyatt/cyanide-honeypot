[tox]
envlist = py39, py310, py311, py312, lint, type, audit
skipsdist = True

[testenv]
deps = 
    .[dev]
setenv =
    PYTHONPATH = {toxinidir}/src
changedir = {toxinidir}
commands = pytest --cov=src --cov-report=term-missing --cov-fail-under=80 tests/

[testenv:lint]
deps = 
    ruff
    black
    isort
commands =
    ruff check src/ tests/
    black --check src/ tests/
    isort --check-only src/ tests/

[testenv:type]
deps = 
    mypy
    .[dev]
commands =
    mypy src/

[testenv:audit]
deps = 
    pip-audit
commands =
    pip-audit
